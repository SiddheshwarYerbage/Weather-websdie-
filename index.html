<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>





    <div class="card">
        <h1>Weather App</h1>

        <div class="search-box">
            <input type="text" id="cityName" placeholder="Enter city">
            <button id="btn">Search</button>
        </div>

        <div class="result">
            <h2 id="city"></h2>
            <h1 id="temp"></h1>
            <p id="desc"></p>
            <img id="icon" />

            <div class="aqi">
                <h3>Air Quality</h3>
                <p id="aqi">--</p>
                <p id="aqi-desc"></p>
                <p id="main-pollutant"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
